<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Constructor Company</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6eee3;
    }

    .card {
      width: min(480px, 90vw);
    }

    img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.1em;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="universallogo.png" alt="Universal Constructor Company">
    <footer>
      <a href="mailto:contact@universalconstructor.co">contact@universalconstructor.co</a>
    </footer>
  </div>
</body>
</html>
